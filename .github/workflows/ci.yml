name: CI

on:
  pull_request:
  push:
    branches: [main, dev, test]

# External services (Firebase, Gemini) are NOT required — they are mocked in tests.
jobs:
  quality:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
        # The committed lockfile is generated on Windows and omits resolved entries
        # for Linux-only optional binaries (rollup/esbuild). Both `npm ci` and
        # `npm install` honor that partial lockfile and skip them (npm/cli#4828).
        # Removing it forces a clean, platform-correct resolution on the runner.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint

  test:
    name: Unit & API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
        # The committed lockfile is generated on Windows and omits resolved entries
        # for Linux-only optional binaries (rollup/esbuild). Both `npm ci` and
        # `npm install` honor that partial lockfile and skip them (npm/cli#4828).
        # Removing it forces a clean, platform-correct resolution on the runner.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run test
      - run: npm run test:coverage --if-present
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
        # The committed lockfile is generated on Windows and omits resolved entries
        # for Linux-only optional binaries (rollup/esbuild). Both `npm ci` and
        # `npm install` honor that partial lockfile and skip them (npm/cli#4828).
        # Removing it forces a clean, platform-correct resolution on the runner.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run build
