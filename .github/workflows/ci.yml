name: CI

on:
  pull_request:
  push:
    branches: [main, dev, test]

# External services (Firebase, Gemini) are NOT required — they are mocked in tests.
jobs:
  quality:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
        # Use `npm install` (not `npm ci`): a Windows-generated lockfile omits the
        # resolved package entries for Linux-only optional binaries (rollup/esbuild),
        # which npm ci cannot install. npm install re-resolves them for the runner.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint

  test:
    name: Unit & API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
        # Use `npm install` (not `npm ci`): a Windows-generated lockfile omits the
        # resolved package entries for Linux-only optional binaries (rollup/esbuild),
        # which npm ci cannot install. npm install re-resolves them for the runner.
      - run: npm install --no-audit --no-fund
      - run: npm run test
      - run: npm run test:coverage --if-present
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
        # Use `npm install` (not `npm ci`): a Windows-generated lockfile omits the
        # resolved package entries for Linux-only optional binaries (rollup/esbuild),
        # which npm ci cannot install. npm install re-resolves them for the runner.
      - run: npm install --no-audit --no-fund
      - run: npm run build
